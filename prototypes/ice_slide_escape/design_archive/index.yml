    review_integrity: human_review
    review_loop_state: rejected_candidate
    retrieval_summary: >
      Human-rejected d4 pre-d5 candidate. It looked tool-supported because the
      winning path used two d4 rebounds and a local probe found dead
      commitments, but human review found reachable d5 fatal and the actual
      play pattern too obvious: push what is visible and win.
    human_comment_ids:
