schema_version: 1
mechanic: ice_slide_escape
status: experimental
source_of_truth: candidate_records
notes:
  - Human comments live in candidate files and should be read before using an example.
  - Tags and retrieval summaries are for navigation and prompt calibration only.
tag_vocabulary:
  status:
    - proposal_ready
    - proposal_ready_with_caveats
    - held_proposal
    - rejected_candidate
    - failed_search
    - structural_redesign_needed
    - rejected
    - held
    - promising
    - reference
    - accepted
    - unknown
  motifs:
    - short_stop_d1_d2
    - destroy_moving_ice_d3
    - d4_rebound
    - d5_pass_through
    - d6_destroy_group
    - restart_counting
    - boundary_disappear
    - target_ice_coverage
    - explicit_edge_goal
    - walled_edge_goal
    - all_mechanic_endgame
    - meta_reinterpretation
  archive_use:
    - positive_reference
    - negative_example
    - critic_calibration
    - designer_calibration
    - human_taste_reference
    - proposal_for_human_review
  archive_eligibility:
    - clean_archive
    - human_pending
    - raw_run_only
    - reject_do_not_archive
  aesthetic_score:
    1: 反例样本
    2: 功能库存
    3: 可用下界
    4: 亮点候选
    5: 标杆范例
  difficulty_score:
    1: 教学见证
    2: 简单练习
    3: 常规流程
    4: 阶段挑战
    5: 高难终局
  review_integrity:
    - independent_review
    - human_review
    - self_review_only
    - missing
    - blocked
  strengths:
    - coupled_state_change
    - readable_geometry
    - compact_causal_chain
    - pacing_buffer
    - good_core_with_bad_claim
  failure_modes:
    - witness_not_application
    - forced_linearity
    - claim_underfit
    - critic_missed_issue
    - critic_over_rejected
    - bypass
    - unconsumed_state_change
