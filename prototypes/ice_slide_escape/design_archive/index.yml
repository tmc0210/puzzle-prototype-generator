      - claim_underfit
    search_ledger_status: light_exploration_log_present
    review_integrity: independent_review
    review_loop_state: rejected_candidate
    retrieval_summary: >
      Negative example for the d4 pre-d5 capstone slot: the returned win has
      two d4 rebounds and no forbidden winning-path events, but critic review
      found the two d4 uses too stitched and forced because the second d4 does
      not consume the first d4 product.
    human_comment_ids: []
