      - witness_not_application
      - claim_underfit
    search_ledger_status: light_exploration_log_present
    review_integrity: independent_review
    review_loop_state: held_proposal
    retrieval_summary: >
      Held all-knowledge endgame attempt. d5 setup creates a target ice later
      consumed by d6 restart as an obstacle, and d6 destruction opens explicit
      goal access. Strong mechanism interlock, but independent critic held it
      as a two-push forced single-win-chain below final-game capstone quality.
    human_comment_ids: []
  - candidate_id: ICE_CAND_0006
    file: candidates/ICE_CAND_0006.md
    experiment_id: ICE_EXP_003_all_knowledge_endgame_capstone
    status: proposal_ready_with_caveats
    archive_eligibility: clean_archive
    motifs:
      - d4_rebound
      - d5_pass_through
      - d6_destroy_group
      - restart_counting
      - target_ice_coverage
      - explicit_edge_goal
      - all_knowledge_endgame
    archive_use:
      - critic_calibration
      - designer_calibration
      - human_taste_reference
    strengths:
      - coupled_state_change
      - readable_geometry
    failure_modes:
      - claim_underfit
    search_ledger_status: exploration_log_present
    review_integrity: independent_review
    review_loop_state: proposal_ready_with_caveats
    retrieval_summary: >
      Human-reviewed proposal-ready-with-caveats all-knowledge candidate. d4
      creates [11,1] stopper, d5 uses it to create [11,2], and d6 uses [11,2]
      after wall destruction to cover the final target. Human comment confirms
      the left-ice misdirection and three-ice order are solid, with wrong orders
      failing later but not too late. Best calibrated as a solid post-unlock
      mainline combination puzzle rather than final-game capstone; caveat is
      left-side detour overhead and slightly low capstone difficulty.
    human_comment_ids:
      - HC_001
example_queries:
  - Find positive or negative d4 rebound examples before designing another rebound level.
  - Find high-difficulty d4 capstone examples before introducing d5.
  - Find all-knowledge endgame capstone examples using d5/d6/restart/boundary mechanics.
  - Find critic calibration cases where the critic missed forced linearity.
  - Find designer calibration cases where the designer claim missed the real highlight.
