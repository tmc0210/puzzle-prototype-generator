    search_ledger_status: light_exploration_log_present
    review_integrity: human_review
    review_loop_state: rejected_candidate
    retrieval_summary: >
      Human-rejected post-miner-fix d4 capstone attempt. Clean evidence: three
      d4 rebounds, complete graph, no d5/d6/restart/boundary report-only hits.
      Independent critic held it as three repeated d4 target-cover applications;
      human review agreed and added that same start/goal is inappropriate here.
