mechanic: pull_portal_fallback
status: draft
target_level_count: 19

target_policy:
  formal_targets:
    - F_pull_single_crate
    - A_reposition_crate_by_pulling
    - A_clear_choke_by_pulling_crate
    - P_clear_choke_by_pulling_blocker
    - F_portals_are_paired
    - F_portal_teleports_player_to_directional_exit
    - A_use_portal_to_enter_sealed_region
    - P_sealed_region_requires_portal_transport
    - I_blocked_exit_pushes_entrance_portal
    - A_trigger_blocked_portal_fallback
    - A_create_blocked_portal_exit_with_crate
    - I_portal_exit_blocker_controls_entry_behavior
    - P_remote_blocker_changes_portal_behavior
    - P_construct_trigger_then_exploit
    - P_portal_as_movable_door_or_key
    - A_repeat_fallback_push_to_move_portal
    - P_repeated_portal_push_corridor
    - A_predict_and_use_fallback_failure
    - P_push_until_jam_boundary
  assumed_rules:
    - F_player_reaches_goal_to_win
    - C_cannot_push_crate
  embedded_boundaries:
    - C_pull_requires_crate_behind_player
    - C_pull_requires_free_destination
    - C_portal_occupies_cell_and_blocks_walking
    - C_crate_blocks_portal_exit
    - C_wall_blocks_portal_exit
    - I_blocked_exit_stops_normal_teleport
    - C_fallback_push_requires_free_portal_destination
    - C_blocked_portal_push_can_fail
  generator_guardrails: []
  notes: >
    Rules and constraints are not automatically curriculum goals. Formal targets
    are reserved for reusable operations, interactions, patterns, and facts that
    deserve explicit level responsibilities.

assumed_known:
  - F_player_reaches_goal_to_win
  - C_cannot_push_crate

ordering_notes: >
  Draft curriculum plan over player_model targets. Non-curricular constraints
  may be bundled into a formal goal when they are needed to understand that
  goal, but they are not standalone teaching goals.

units:
  - id: pull_foundations
    title: Pull Foundations
    description: Establish pulling and the first reusable crate manipulation patterns.
    goals:
      - id: G_pull_single_crate
        target:
          kind: fact
          ref: F_pull_single_crate
        known_before: [F_player_reaches_goal_to_win, C_cannot_push_crate]
        hard_prerequisites: []
        role_sequence: [discovery, review]
        support_level: high
        blocked_by_open_questions: []
        expected_solver_evidence:
          - solvable
          - player_win_standard
          - returned_solution_covers_target_events
        expected_llm_player_evidence:
          - forms_target_hypothesis
          - uses_target_hypothesis_to_finish
        soft_ordering:
          locality: local
          observability: direct
          mechanism_count: 1
          state_space_burden: low
        ordering_rationale: >
          Pulling is the first active operation; the no-push rule is treated as
          an assumed rule rather than a standalone lesson.

      - id: G_reposition_crate_by_pulling
        target:
          kind: ability
          ref: A_reposition_crate_by_pulling
        known_before:
          - F_player_reaches_goal_to_win
          - C_cannot_push_crate
          - F_pull_single_crate
        hard_prerequisites:
          - F_pull_single_crate
          - C_pull_requires_crate_behind_player
          - C_pull_requires_free_destination
        role_sequence: [guided_application, independent_application]
        support_level: medium
        bundle_with:
          - C_pull_requires_crate_behind_player
          - C_pull_requires_free_destination
        blocked_by_open_questions: []
        expected_solver_evidence:
          - player_win_standard
          - returned_solution_covers_target_events
        expected_llm_player_evidence:
          - applies_known_target_without_relearning
          - forms_subgoal_chain
        soft_ordering:
          locality: local
          observability: direct
          mechanism_count: 1
          state_space_burden: low
        ordering_rationale: >
          Pull preconditions matter, but they are embedded in the first useful
          crate repositioning task rather than split into standalone levels.

      - id: G_clear_choke_by_pulling
        target:
          kind: ability
          ref: A_clear_choke_by_pulling_crate
        known_before:
          - F_player_reaches_goal_to_win
          - C_cannot_push_crate
          - A_reposition_crate_by_pulling
        hard_prerequisites:
