          - all_winning_paths_cover_target_events
        expected_llm_player_evidence:
          - identifies_bottleneck
          - forms_subgoal_chain
        soft_ordering:
          locality: local
          observability: structural
          mechanism_count: 1
          state_space_burden: medium
        ordering_rationale: >
          Clearing a choke is the first spatial use of the repositioning ability.

      - id: G_clear_choke_pattern
        target:
          kind: pattern
          ref: P_clear_choke_by_pulling_blocker
        known_before:
