mechanic: pull_portal_fallback
target_level_count: 20

tracks:
  - id: basics
    title: Pulling Instead Of Pushing
    description: Establish the pull-only movement model before introducing portals.
    goals:
      - knowledge: [K_pull_single_crate]
        roles: [discovery, review]
        count: 2
      - knowledge: [K_cannot_push_crate]
        roles: [boundary]
        count: 2
      - knowledge: [K_pull_opens_path]
        roles: [guided_application, independent_application, variation_transfer]
        count: 2

  - id: portals
    title: Portal Baseline
    description: Teach ordinary paired portal behavior before blocked exits.
    goals:
      - knowledge: [K_portal_teleports_player]
        roles: [discovery, guided_application, independent_application]
        count: 2

  - id: blocked_exit
    title: Blocked Portal Exit
    description: Reveal the main exception and make it necessary.
    goals:
      - knowledge: [K_blocked_portal_stops_teleport]
        roles: [discovery]
        count: 1
      - knowledge: [K_blocked_portal_pushes_entrance]
        roles: [discovery, guided_application]
        count: 3
      - knowledge: [K_blocked_portal_push_can_fail]
        roles: [boundary]
        count: 1

  - id: constructed_triggers
    title: Constructing The Exception
    description: Require the player to create the blocked exit before exploiting it.
    goals:
      - knowledge: [K_use_crate_to_block_portal_exit]
        roles: [guided_application, independent_application, variation_transfer]
        count: 3
      - knowledge: [K_move_portal_to_open_path]
        roles: [guided_application, independent_application, variation_transfer, combination, challenge]
        count: 4

  - id: finale
    title: Combined Challenges
    description: Combine pull-only routing, portal blocking, and portal repositioning.
    goals:
      - knowledge:
          - K_pull_opens_path
          - K_use_crate_to_block_portal_exit
          - K_move_portal_to_open_path
        roles: [combination, challenge]
        count: 3
