    assesses: [A_reposition_crate_by_pulling]
    generation_contract:
      objective: guided_application
      win_condition: prototype_default
      board_size: { min_width: 5, max_width: 8, min_height: 4, max_height: 7 }
      required_objects: [wall, player, goal, crate]
      allowed_objects: [floor, wall, player, goal, crate]
      required_rules: [pull_single_crate]
      allowed_rules: [walk, pull_single_crate, cannot_push_crate]
      structural_requirements:
        - Crate must be moved to a useful new position by pulling.
        - The valid pull setup naturally exposes pull positioning constraints.
      forbidden_shortcuts:
