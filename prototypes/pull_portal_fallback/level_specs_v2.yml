specs:
  - id: LS01_pull_discovery
    title: Pull Discovery
    status: draft
    primary_goal: G_pull_single_crate
    role: discovery
    support_level: high
    focus_targets:
      - kind: fact
        ref: F_pull_single_crate
    known_before: [F_player_reaches_goal_to_win, C_cannot_push_crate]
    introduces: [F_pull_single_crate]
    practices: []
    assesses: [F_pull_single_crate]
    generation_contract:
      objective: isolate_target
      win_condition: prototype_default
      board_size: { min_width: 4, max_width: 6, min_height: 3, max_height: 5 }
      required_objects: [wall, player, goal, crate]
      allowed_objects: [floor, wall, player, goal, crate]
      required_rules: [pull_single_crate]
      allowed_rules: [walk, pull_single_crate, cannot_push_crate]
      structural_requirements:
        - Player can only reach the goal after observing a crate being pulled.
      forbidden_shortcuts:
        - Goal must not be reachable by walking without pull_crate.
    evidence_contract:
      solver: [solvable, player_win_standard, returned_solution_covers_target_events]
      llm_player: [forms_target_hypothesis, uses_target_hypothesis_to_finish]
      graph_scope: full_graph_required
      event_requirements:
        winning_solution:
          required: [pull_crate]
    acceptance:
      requires_player_win_standard: true
      requires_target_on_solution_path: true
      requires_no_event_win: true
    blocked_by_open_questions: []

  - id: LS02_reposition_crate
