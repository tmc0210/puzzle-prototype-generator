mechanic: pull_portal_fallback

levels:
  - id: L01
    title: First Pull
    role: discovery
    status: candidate
    targets: [K_pull_single_crate]
    known_before: []
    target_learning: [K_pull_single_crate]
    support_level: high
    expected_solver_evidence:
      - solvable
      - returned_solution_covers_target_events
    expected_llm_player_evidence:
      - forms_target_hypothesis
      - uses_target_hypothesis_to_finish
    failure_interpretation:
      no_pull_hypothesis: pull_motion_not_telegraphed
      solves_without_pull: target_not_required
    layout: |
      #######
      #C@G  #
      #######
    expected_trace:
      - input: right
        events: [pull_crate]
      - input: right
        events: [pull_crate]
    expected_events: [pull_crate]
    design_notes: >
      Minimal pull witness. Solver should verify whether the current win
      condition and layout produce the intended crate-on-goal result.
    analysis:
      proof_status: candidate_fixture

  - id: L02
