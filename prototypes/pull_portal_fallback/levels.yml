    target_learning: [K_cannot_push_crate]
    support_level: high
    expected_solver_evidence:
      - solvable
      - expected_trace_covers_target_events
    expected_llm_player_evidence:
      - tries_old_model
      - observes_old_model_failure
      - revises_rule_model
    failure_interpretation:
      repeats_push_attempts: boundary_feedback_too_weak
      cannot_route_to_pull: application_too_hard
    layout: |
      ########
      #@C G  #
      #   ####
      #      #
      ########
    expected_trace:
      - input: right
        events: [push_crate_failed]
    expected_events: [push_crate_failed, pull_crate]
    design_notes: >
      The first visible attempt fails because the crate cannot be pushed.
      A verified version should require the player to route around and pull.
    analysis:
      proof_status: candidate_fixture

