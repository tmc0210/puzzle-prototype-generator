mechanic: MECHANIC_ID

required_docs:
  - prototypes/MECHANIC_ID/docs/rules.md
  - prototypes/MECHANIC_ID/docs/solver_contract.md
  - prototypes/MECHANIC_ID/docs/designer_contract.md

tool_commands:
  tool_maturity: "npx tsx src/cli.ts tool-maturity prototypes/MECHANIC_ID"
  explain_layout: "npx tsx src/cli.ts explain-layout prototypes/MECHANIC_ID <layout-file|-> [options]"
  solve: "npx tsx src/cli.ts solve prototypes/MECHANIC_ID <level-id>"

prototype_specific_workflows:
  - id: WORKFLOW_ID
    kind: diagnostic | redesign_stage | paired_design_mode | pre_human_submission_pass
    default_status: routed | disabled_unless_brief_enabled | run_after_proposal_ready | not_applicable
    trigger:
      - "When this workflow should be considered."
    authority_docs:
      - prototypes/MECHANIC_ID/docs/designer_contract.md
    packet_extension:
      - field_name
      - optional.interface_pair_policy
    reviewer_focus:
      - "Evidence-specific checks."
      - "If this workflow declares ignored pair classes, evidence about those pairs is recorded with no verdict effect."
    critic_focus:
      - "Player-facing design checks."
      - "If this workflow declares risky pair classes, only those classes may become pair-policy caveats or attacks."
    forbidden_unless:
      - "Condition required before this workflow may be used."
      - "If this workflow derives from an archive candidate, the brief must explicitly authorize the candidate id and allowed operations."
